<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek eSIM Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Sofort-Schutz: Versteckt alles bis der Login bestätigt ist */
        #admin-app { display: none; }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: #2a2a2a; padding: 2rem; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #333; border: 1px solid #444; color: white; border-radius: 6px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff; border: none;
            color: white; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: white; margin-bottom: 1.5rem;">Admin Login</h2>
            <input type="text" id="username" placeholder="Benutzername">
            <input type="password" id="password" placeholder="Passwort">
            <button onclick="handleLogin()">Anmelden</button>
            <p id="login-error" class="error-msg">Zugriff verweigert</p>
        </div>
    </div>

    <div id="admin-app">
        <nav class="navbar">
            <div class="logo">DeepSeek eSIM Admin <span id="version-tag"></span></div>
            <div class="nav-links">
                <button onclick="showSection('chats')">Chats</button>
                <button onclick="showSection('learning')">Learning <span id="learning-badge" class="badge">0</span></button>
                <button onclick="showSection('knowledge')">Wissen</button>
                <button onclick="showSection('security')">Sicherheit</button>
                <button onclick="showSection('settings')">Settings</button>
                <button onclick="handleLogout()" style="background: #dc3545;">Logout</button>
            </div>
        </nav>

        <main class="container">
            <section id="stats-bar" class="stats-grid">
                </section>
            
            </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // LOGIN LOGIK DIREKT HIER ODER IN dashboard.js
        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('login-error');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('admin_token', data.token);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-app').style.display = 'block';
                    // Initialisiere Dashboard Daten
                    if (typeof initDashboard === 'function') initDashboard();
                } else {
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = "Server-Verbindung fehlgeschlagen";
                err.style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem('admin_token');
            window.location.reload();
        }

        // Check beim Laden
        if (localStorage.getItem('admin_token')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-app').style.display = 'block';
        }
    </script>
</body>
</html>
